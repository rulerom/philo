<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleRom Philo 🧭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            padding: 1rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .lang-select {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }
        .lang-select select {
            padding: 0.8rem 1.2rem;
            border: 2px solid #00d9ff;
            background: rgba(0,217,255,0.1);
            color: #00d9ff;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        .lang-select select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .ok-btn {
            padding: 0.8rem 2rem;
            border: 2px solid #00ff88;
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }
        .ok-btn:hover {
            background: #00ff88;
            color: #1a1a2e;
            transform: translateY(-2px);
        }
        .contact {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        .contact a {
            color: #00d9ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧭 RuleRom Philo</h1>
        <p class="subtitle">Philosophy of Deterministic Approach</p>

        <div class="lang-select">
            <select id="lang">
                <option value="en">🇬🇧 English</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
            <a href="#" class="ok-btn" id="ok-btn">OK</a>
        </div>

        <div class="contact">
            <p>📧 <a href="mailto:intent@rulerom.com">intent@rulerom.com</a></p>
        </div>
    </div>

    <script>
        const langSelect = document.getElementById('lang');
        const okBtn = document.getElementById('ok-btn');

        // Авто-выбор языка
        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang.split('-')[0].toLowerCase();

        if (lang === 'ru' || lang === 'uk' || lang === 'be') {
            langSelect.value = 'ru';
        } else if (lang === 'zh' || lang === 'cn' || lang === 'tw') {
            langSelect.value = 'zh';
        } else {
            langSelect.value = 'en';
        }

        // Обновление ссылки при выборе
        function updateLink() {
            const selected = langSelect.value;
            okBtn.href = '/' + selected + '/';
        }

        langSelect.addEventListener('change', updateLink);
        updateLink();
    </script>
</body>
</html>
